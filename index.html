<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쇼핑 리스트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        #itemInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #itemInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        #addBtn:hover {
            background: #5568d3;
        }

        #addBtn:active {
            transform: scale(0.98);
        }

        #listContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .list-item:hover {
            background: #e9ecef;
        }

        .list-item.completed {
            opacity: 0.6;
        }

        .list-item.completed .item-text {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .item-text {
            flex: 1;
            color: #333;
            font-size: 16px;
            word-break: break-word;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ee5a52;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 쇼핑 리스트</h1>

        <div class="input-group">
            <input
                type="text"
                id="itemInput"
                placeholder="아이템을 입력하세요..."
            >
            <button id="addBtn">추가</button>
        </div>

        <div id="listContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function() {
            if (window.__shoppingListInitialized) return;
            window.__shoppingListInitialized = true;

            const SUPABASE_URL = 'https://thyyfqhikjfcrjlfqicz.supabase.co';
            const SUPABASE_ANON_KEY = 'sb_publishable_pLZT8V1yKuey6rYYV7qxIg_vLBApm2l';

            const supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

            const itemInput = document.getElementById('itemInput');
            const addBtn = document.getElementById('addBtn');
            const listContainer = document.getElementById('listContainer');

            if (!supabaseClient) {
                listContainer.innerHTML = '<div class="empty-message">Supabase 연결 실패</div>';
                return;
            }
            // Supabase에서 리스트 로드
            async function loadList() {
                try {
                    const { data, error } = await supabaseClient
                        .from('shopping_items')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;
                    return data || [];
                } catch (error) {
                    console.error('데이터 로드 실패:', error);
                    return [];
                }
            }

            // UI 업데이트
            async function renderList() {
                const list = await loadList();
                listContainer.innerHTML = '';

                if (list.length === 0) {
                    listContainer.innerHTML = '<div class="empty-message">아직 아이템이 없습니다</div>';
                    return;
                }

                list.forEach((item) => {
                    const div = document.createElement('div');
                    div.className = `list-item ${item.completed ? 'completed' : ''}`;

                    div.innerHTML = `
                        <input
                            type="checkbox"
                            ${item.completed ? 'checked' : ''}
                            onchange="window.toggleItem('${item.id}')"
                        >
                        <span class="item-text">${item.text}</span>
                        <button class="delete-btn" onclick="window.deleteItem('${item.id}')">삭제</button>
                    `;

                    listContainer.appendChild(div);
                });
            }

            // 아이템 추가
            async function addItem() {
                const text = itemInput.value.trim();
                if (!text) return;

                try {
                    const { error } = await supabaseClient
                        .from('shopping_items')
                        .insert([{ text, completed: false }]);

                    if (error) throw error;

                    renderList();
                    itemInput.value = '';
                    itemInput.focus();
                } catch (error) {
                    console.error('아이템 추가 실패:', error);
                    alert('아이템 추가에 실패했습니다.');
                }
            }

            // 아이템 체크 토글
            async function toggleItem(id) {
                try {
                    const list = await loadList();
                    const item = list.find(i => i.id === id);

                    const { error } = await supabaseClient
                        .from('shopping_items')
                        .update({ completed: !item.completed })
                        .eq('id', id);

                    if (error) throw error;

                    renderList();
                } catch (error) {
                    console.error('아이템 업데이트 실패:', error);
                }
            }

            // 아이템 삭제
            async function deleteItem(id) {
                try {
                    const { error } = await supabaseClient
                        .from('shopping_items')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;

                    renderList();
                } catch (error) {
                    console.error('아이템 삭제 실패:', error);
                }
            }

            // 이벤트 리스너
            addBtn.addEventListener('click', addItem);
            itemInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addItem();
            });

            // 초기 렌더링
            renderList();

            // 전역으로 접근 가능하게
            window.addItem = addItem;
            window.toggleItem = toggleItem;
            window.deleteItem = deleteItem;
        })();
    </script>
</body>
</html>
